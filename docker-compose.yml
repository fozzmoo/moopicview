version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://moopicview:password@db:5432/moopicview?sslmode=disable
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - PHOTO_ROOT=/unas/images
    volumes:
      - /unas:/unas:ro
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: moopicview
      POSTGRES_USER: moopicview
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
